apiVersion: v1
kind: Namespace
metadata:
  name: application
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-demo
  namespace: application
  labels:
    app: incident-demo
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: incident-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: incident-demo
    spec:
      containers:
        - name: app
          image: incident-demo:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: APP_NAME
              value: "incident-demo"
            - name: APP_VERSION
              value: "k8s-local"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "384Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: incident-demo
  namespace: application
  labels:
    app: incident-demo
spec:
  type: NodePort
  selector:
    app: incident-demo
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30080
